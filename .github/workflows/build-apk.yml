name: Build Android APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Project Dependencies
        run: |
          npm install --legacy-peer-deps
          npm install @capacitor/core @capacitor/cli @capacitor/android --legacy-peer-deps

      - name: Compile TanStack Start Code
        run: npm run build

      - name: Fix Missing Index HTML Requirement
        run: |
          mkdir -p .output/public
          echo '<!DOCTYPE html><html><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/></head><body><div id="root"></div><script>window.location.href="index.html";</script></body></html>' > .output/public/index.html

      - name: Initialize Android Native Project
        run: |
          npx cap init WorkoutApp com.lovable.workoutapp --web-dir=.output/public
          npx cap add android

      - name: Sync Compiled App into Android Studio Folder
        run: npx cap sync android

      - name: Set up Java Compiler Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build Standalone APK Binary
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Save and Upload APK File
        uses: actions/upload-artifact@v4
        with:
          name: MobileApp-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 5
