name: Build Android APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Project Dependencies
        run: npm install --legacy-peer-deps

      - name: Compile App Code
        run: npm run build

      # This copies your real 'dist' files directly into the existing Android project
      - name: Sync Compiled App into Android Studio Folder
        run: npx cap sync android

      - name: Set up Java Compiler Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build Standalone APK Binary
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Save and Upload APK File
        uses: actions/upload-artifact@v4
        with:
          name: MobileApp-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 5
