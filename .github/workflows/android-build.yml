name: Build Android APK

on:
  push:
    branches: [ NewStack ]
  pull_request:
    branches: [ NewStack ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Set up Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Install Dependencies
      run: bun install

    - name: Build Web Application
      run: bun run build

    - name: Install Capacitor Tooling
      run: bun add @capacitor/cli @capacitor/android

    - name: Ensure Android Platform Exists
      run: |
        if [ ! -d "android" ]; then
          bunx cap add android
        fi

    - name: Capacitor Sync
      run: bunx cap sync android

    - name: Chmod Gradle Wrapper
      run: chmod +x android/gradlew

    # Changed from assembleDebug to assembleRelease for proper production signing
    - name: Build with Gradle
      run: |
        cd android
        ./gradlew assembleRelease

           # Automatically signs the generated release APK using your GitHub Secrets
    - name: Sign APK
      uses: ilharp/sign-android-release@v2
      id: sign_app
      with:
        releaseDir: android/app/build/outputs/apk/release
        signingKey: ${{ secrets.SIGNING_KEY }}
        keyAlias: ${{ secrets.KEY_ALIAS }}
        keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
        keyPassword: ${{ secrets.KEY_PASSWORD }}

    # Uploads your permanently signed APK file
    - name: Upload Signed APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: untrained-effort-signed
        path: ${{ steps.sign_app.outputs.signedFile }}
        retention-days: 7
