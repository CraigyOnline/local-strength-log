name: Build Android APK

on:
  push:
    branches: [ NewStack ]
  pull_request:
    branches: [ NewStack ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    # 1. Install Bun in the GitHub runner
    - name: Set up Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    # 2. Use Bun to install your dependencies cleanly
    - name: Install Dependencies
      run: bun install --frozen-lockfile

    # 3. Compile your web project using Bun
    - name: Build Web Application
      run: bun run build

    # 4. Use bunx instead of npx to execute Capacitor commands
    - name: Install Capacitor Tooling
      run: bun add @capacitor/core @capacitor/cli @capacitor/android

    - name: Ensure Android Platform Exists
      run: |
        if [ ! -d "android" ]; then
          bunx cap add android
        fi

    - name: Capacitor Sync
      run: bunx cap sync android

    - name: Chmod Gradle Wrapper
      run: chmod +x android/gradlew

    - name: Build with Gradle
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
